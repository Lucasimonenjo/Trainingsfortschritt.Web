name: Deploy Blazor WebAssembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # .NET SETUP
      # =========================
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # =========================
      # RESTORE
      # =========================
      - name: Restore
        run: dotnet restore Trainingsfortschritt.Web.csproj

      # =========================
      # PUBLISH (GitHub Pages Fix)
      # =========================
      - name: Publish
        run: dotnet publish Trainingsfortschritt.Web.csproj -c Release -o publish

      # =========================
      # FIX BASE HREF (WICHTIG)
      # =========================
      - name: Fix base href for GitHub Pages
        run: |
          sed -i 's|<base href="/"|<base href="/Trainingsfortschritt.Web/"|g' publish/wwwroot/index.html

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
