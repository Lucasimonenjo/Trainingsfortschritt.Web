name: Deploy Blazor WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Trainingsfortschritt.Web.csproj
      - name: Publish
        run: dotnet publish Trainingsfortschritt.Web.csproj -c Release -o publish --nologo -p:StaticWebAssetBasePath=/Trainingsfortschritt.Web
      - name: Fix blazor script tags in index.html
        run: |
          WWWROOT="publish/wwwroot/Trainingsfortschritt.Web"

          DOTNET_JS=$(ls $WWWROOT/_framework/dotnet.*.js | grep -v native | grep -v runtime | xargs basename)

          echo "Dotnet JS: $DOTNET_JS"

          sed -i "s|<script src=\"_framework/blazor.webassembly.js\"></script>|<script src=\"_framework/$DOTNET_JS\" type=\"module\"></script>|" $WWWROOT/index.html

          echo "=== Ergebnis ==="
          grep "script src" $WWWROOT/index.html
      - name: Add .nojekyll
        run: touch publish/wwwroot/Trainingsfortschritt.Web/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot/Trainingsfortschritt.Web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
