name: Deploy Blazor WebAssembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Trainingsfortschritt.Web.csproj

      - name: Publish
        run: dotnet publish Trainingsfortschritt.Web.csproj -c Release -o publish

      # 🔥 SPA FIX 1: fallback routing
      - name: Copy index.html to 404.html
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      # 🔥 SPA FIX 2: correct base path
      - name: Fix base href
        run: sed -i 's|<base href="/"|<base href="/Trainingsfortschritt.Web/"|g' publish/wwwroot/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
