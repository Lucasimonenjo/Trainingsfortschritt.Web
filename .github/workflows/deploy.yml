name: Deploy Blazor WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Trainingsfortschritt.Web.csproj
      - name: Publish
        run: dotnet publish Trainingsfortschritt.Web.csproj -c Release -o publish --nologo -p:StaticWebAssetBasePath=/Trainingsfortschritt.Web
      - name: Fix blazor script tags in index.html
        run: |
          WWWROOT="publish/wwwroot/Trainingsfortschritt.Web"

          DOTNET_JS=$(ls $WWWROOT/_framework/dotnet.*.js | grep -v native | grep -v runtime | xargs basename)
          BLAZOR_JS=$(ls $WWWROOT/_framework/blazor.webassembly.*.js | xargs basename)

          echo "Dotnet JS: $DOTNET_JS"
          echo "Blazor JS: $BLAZOR_JS"

          # dotnet.js Alias erstellen
          echo "export * from './$DOTNET_JS'; export { default } from './$DOTNET_JS';" > $WWWROOT/_framework/dotnet.js

          # index.html aktualisieren
          REPLACEMENT="<script src=\"_framework\/$BLAZOR_JS\" autostart=\"false\"><\/script>\n    <script>\n        document.addEventListener('DOMContentLoaded', function() {\n            Blazor.start();\n        });\n    <\/script>"
          sed -i "s|<!--BLAZOR_SCRIPT_PLACEHOLDER-->|$REPLACEMENT|" $WWWROOT/index.html

          echo "=== Ergebnis index.html ==="
          grep -A5 "framework" $WWWROOT/index.html
          echo "=== dotnet.js Inhalt ==="
          cat $WWWROOT/_framework/dotnet.js
      - name: Add .nojekyll
        run: touch publish/wwwroot/Trainingsfortschritt.Web/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot/Trainingsfortschritt.Web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
